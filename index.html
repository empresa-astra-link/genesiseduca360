<script>

function ativarSom(){
    document.getElementById("video").contentWindow.postMessage(
    '{"event":"command","func":"unMute","args":""}',
    '*');
}

/* Contador da transmissão */

let segundos = 0;

setInterval(() => {

    segundos++;

    let min = Math.floor(segundos/60);
    let seg = segundos%60;

    document.getElementById("tempo").innerHTML =
        String(min).padStart(2,'0')
        + ":"
        +
        String(seg).padStart(2,'0');

},1000);


/* Contagem regressiva do certificado */

let restante = 60;

let intervalo = setInterval(() => {

    restante--;

    let min = Math.floor(restante/60);
    let seg = restante%60;

    document.getElementById("contadorCertificado").innerHTML =
    "📜 Certificado disponível em: "
    +
    String(min).padStart(2,'0')
    + ":"
    +
    String(seg).padStart(2,'0');

    if(restante <= 0){

        clearInterval(intervalo);

        document.getElementById("contadorCertificado").innerHTML =
        "✅ Certificado disponível para emissão";

        let botao = document.getElementById("certificado");

        botao.disabled = false;

        botao.classList.add("ativo");

        botao.onclick = function(){

            window.location.href =
            "https://empresa-astra-link.github.io/genesiseduca360/certificado.html";

        };

    }

},1000);

</script>
