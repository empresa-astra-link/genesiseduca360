<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Palestra Ao Vivo</title>

  <style>
    body {
      margin: 0;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
    }

    /* 🔴 AO VIVO PISCANDO */
    .live {
      margin-top: 10px;
      color: red;
      font-weight: bold;
      animation: blink 1s infinite;
      font-size: 14px;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.2; }
      100% { opacity: 1; }
    }

    .player {
      position: relative;
      width: 90%;
      max-width: 900px;
      aspect-ratio: 16 / 9;
      margin-top: 15px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* 🔒 bloqueia clique no vídeo */
    .overlay {
      position: absolute;
      inset: 0;
      background: transparent;
      z-index: 10;
    }

    /* botão */
    button {
      margin-top: 20px;
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      background: gray;
      color: white;
      cursor: not-allowed;
    }

    button.enabled {
      background: green;
      cursor: pointer;
    }

    .info {
      margin-top: 10px;
      color: #aaa;
      font-size: 14px;
    }

  </style>
</head>

<body>

  <header>Palestra Ao Vivo</header>

  <div class="live">🔴 AO VIVO</div>

  <div class="player">

    <iframe
      src="https://www.youtube.com/embed/J4XQM3W5Q78?autoplay=1&mute=1"
      allow="autoplay; encrypted-media">
    </iframe>

    <div class="overlay"></div>

  </div>

  <div class="info" id="info">
    Aguarde 1 minuto assistindo para liberar a confirmação...
  </div>

  <button id="btn" disabled>
    Confirmar presença
  </button>

  <script>
    const btn = document.getElementById("btn");
    const info = document.getElementById("info");

    let tempo = 60; // 1 minuto

    const timer = setInterval(() => {
      tempo--;

      info.innerText = `Tempo restante: ${tempo} segundos`;

      if (tempo <= 0) {
        clearInterval(timer);
        btn.disabled = false;
        btn.classList.add("enabled");
        btn.innerText = "Confirmar presença ✔";
        info.innerText = "Você já pode confirmar sua presença.";
      }
    }, 1000);
  </script>

</body>
</html>
