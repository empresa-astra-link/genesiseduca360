<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Palestra Ao Vivo</title>

  <style>
    body {
      margin: 0;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
    }

    /* 🔴 AO VIVO PISCANDO */
    .live {
      margin-top: 10px;
      color: red;
      font-weight: bold;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.2; }
      100% { opacity: 1; }
    }

    .player {
      position: relative;
      width: 90%;
      max-width: 900px;
      aspect-ratio: 16 / 9;
      margin-top: 15px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* 🔒 bloqueia clique no player */
    .overlay {
      position: absolute;
      inset: 0;
      background: transparent;
      z-index: 10;
    }

    /* 🔊 botão de som */
    .sound-btn {
      margin-top: 20px;
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      background: #444;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .sound-btn:hover {
      background: green;
    }

  </style>
</head>

<body>

  <header>Palestra Ao Vivo</header>

  <div class="live">🔴 AO VIVO</div>

  <div class="player">

    <iframe id="video"
      src="https://www.youtube.com/embed/J4XQM3W5Q78?autoplay=1&mute=1"
      allow="autoplay; encrypted-media">
    </iframe>

    <div class="overlay"></div>

  </div>

  <!-- 🔊 BOTÃO PARA ATIVAR SOM -->
  <button class="sound-btn" onclick="ativarSom()">
    🔊 Ativar som
  </button>

  <script>
    function ativarSom() {
      const video = document.getElementById("video");

      // remove mute recriando o iframe
      video.src = "https://www.youtube.com/embed/J4XQM3W5Q78?autoplay=1";
    }
  </script>

</body>
</html>
