<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Palestra ao Vivo</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
    }

    .player {
      position: relative;
      width: 90%;
      max-width: 900px;
      aspect-ratio: 16 / 9;
      margin-top: 10px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* 🔒 bloqueia clique no vídeo */
    .overlay {
      position: absolute;
      inset: 0;
      background: transparent;
      z-index: 10;
    }

    .info {
      margin-top: 15px;
      color: #aaa;
      font-size: 14px;
      text-align: center;
      max-width: 800px;
    }

    button {
      margin-top: 20px;
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      background: gray;
      color: white;
      font-size: 16px;
      cursor: not-allowed;
    }

    button.enabled {
      background: green;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <header>🔴 Palestra ao Vivo</header>

  <div class="player">
    <!-- 🎥 VÍDEO DE TESTE (substitua depois pelo seu) -->
    <iframe
      src="https://www.youtube.com/embed/apo97y0EkzfR2NJk?autoplay=1&mute=1"
      allow="autoplay; encrypted-media">
    </iframe>

    <div class="overlay"></div>
  </div>

  <div class="info" id="info">
    Assista a palestra. O botão será liberado após o tempo mínimo.
  </div>

  <button id="btn" disabled>
    Confirmar presença
  </button>

  <script>
    const btn = document.getElementById("btn");
    const info = document.getElementById("info");

    let tempo = 120; // 2 minutos para teste

    const timer = setInterval(() => {
      tempo--;

      let min = Math.floor(tempo / 60);
      let sec = tempo % 60;

      info.innerText = `Tempo mínimo de presença: ${min}:${sec.toString().padStart(2, "0")}`;

      if (tempo <= 0) {
        clearInterval(timer);
        btn.disabled = false;
        btn.classList.add("enabled");
        btn.innerText = "Confirmar presença ✔";
        info.innerText = "Você já pode confirmar sua presença.";
      }
    }, 1000);
  </script>

</body>
</html>
